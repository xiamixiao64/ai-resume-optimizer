<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeForge AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        .card h1 { font-size: 1.8rem; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; }
        input { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 1rem; margin-bottom: 20px; }
        input:focus { outline: none; border-color: #6366f1; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.3); }
        .error { background: #2a1a1a; border: 1px solid #ef4444; color: #f87171; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .links { text-align: center; margin-top: 20px; color: #888; }
        .links a { color: #a855f7; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <p class="subtitle">Welcome back to ResumeForge AI</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Your password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="links">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>
</body>
</html>
