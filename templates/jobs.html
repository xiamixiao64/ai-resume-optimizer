<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge AI - Find Matching Jobs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: #111; border-bottom: 1px solid #222; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
        .hero { text-align: center; padding: 40px 0 30px; }
        .hero h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
        .hero p { color: #888; max-width: 500px; margin: 0 auto; }

        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        textarea { width: 100%; min-height: 200px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; color: #e0e0e0; font-family: inherit; font-size: 0.95rem; resize: vertical; }
        textarea:focus { outline: none; border-color: #6366f1; }
        textarea::placeholder { color: #555; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 16px; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.3); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; margin-top: 24px; }
        .job-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: default; }
        .job-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .job-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .job-company { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
        .job-score { display: inline-block; padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.85rem; margin-bottom: 12px; }
        .job-score.high { background: #1a2e1a; color: #22c55e; }
        .job-score.mid { background: #2a2a1a; color: #eab308; }
        .job-score.low { background: #2a1a1a; color: #f87171; }
        .job-desc { font-size: 0.85rem; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
        .job-skills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .skill-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .skill-tag.matched { background: #1a2e1a; color: #22c55e; }
        .skill-tag.missing { background: #2a1a1a; color: #f87171; }
        .job-salary { font-size: 0.85rem; color: #a855f7; font-weight: 600; }

        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state p { margin-bottom: 16px; }

        .cta { text-align: center; margin-top: 40px; }
        .cta a { color: #a855f7; text-decoration: none; font-weight: 600; }

        @media (max-width: 640px) { .jobs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>ResumeForge AI</h1>
        <a href="/">Back to Optimizer</a>
    </div>

    <div class="container">
        <div class="hero">
            <h2>Find Matching Jobs</h2>
            <p>Paste your resume and discover roles that match your skills and experience</p>
        </div>

        <div class="card">
            <form id="jobsForm" onsubmit="findJobs(event)">
                <label>Your Resume *</label>
                <textarea id="resumeText" placeholder="Paste your resume content here...&#10;&#10;AI will analyze your skills and suggest matching job roles." required></textarea>
                <button type="submit" class="submit-btn" id="submitBtn">Find Matching Jobs</button>
            </form>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your skills and finding matches...</p>
            </div>
        </div>

        <div id="results"></div>

        <div class="cta">
            <a href="/">&#x2190; Back to Resume Optimizer</a>
        </div>
    </div>

    <script>
        async function findJobs(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const form = document.getElementById('jobsForm');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.style.display = 'block';
            form.style.display = 'none';
            results.innerHTML = '';

            const formData = new FormData();
            formData.append('resume_text', document.getElementById('resumeText').value);

            try {
                const resp = await fetch('/api/jobs/match', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.error) {
                    results.innerHTML = '<div class="card"><p style="color:#f87171">' + data.error + '</p></div>';
                } else if (data.jobs && data.jobs.length > 0) {
                    let html = '<div class="jobs-grid">';
                    data.jobs.forEach(job => {
                        const scoreClass = job.match_score >= 75 ? 'high' : job.match_score >= 50 ? 'mid' : 'low';
                        const matchedTags = (job.matched_skills || []).map(s => '<span class="skill-tag matched">' + s + '</span>').join('');
                        const missingTags = (job.missing_skills || []).map(s => '<span class="skill-tag missing">' + s + '</span>').join('');
                        html += '<div class="job-card">';
                        html += '<div class="job-title">' + job.title + '</div>';
                        html += '<div class="job-company">' + job.company_type + '</div>';
                        html += '<div class="job-score ' + scoreClass + '">' + job.match_score + '% Match</div>';
                        if (job.salary_range) html += '<div class="job-salary">' + job.salary_range + '</div>';
                        html += '<div class="job-desc">' + (job.description || '') + '</div>';
                        html += '<div class="job-skills">' + matchedTags + missingTags + '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                    results.innerHTML = html;
                } else {
                    results.innerHTML = '<div class="card empty-state"><p>No matching jobs found. Try adding more details to your resume.</p></div>';
                }
            } catch (err) {
                results.innerHTML = '<div class="card"><p style="color:#f87171">Error: ' + err.message + '</p></div>';
            }

            btn.disabled = false;
            loading.style.display = 'none';
            form.style.display = 'block';
        }
    </script>
</body>
</html>
