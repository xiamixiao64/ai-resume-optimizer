<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge AI - Optimization History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: #111; border-bottom: 1px solid #222; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
        .hero { text-align: center; padding: 40px 0 30px; }
        .hero h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
        .hero p { color: #888; }
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: border-color 0.2s; cursor: pointer; }
        .history-card:hover { border-color: #6366f1; }
        .history-score { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; flex-shrink: 0; }
        .history-score.high { background: #1a2e1a; color: #22c55e; }
        .history-score.mid { background: #2a2a1a; color: #eab308; }
        .history-score.low { background: #2a1a1a; color: #f87171; }
        .history-info { flex: 1; }
        .history-mode { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; background: #1a1a2e; color: #818cf8; display: inline-block; margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .history-date { font-size: 0.85rem; color: #888; }
        .history-preview { font-size: 0.85rem; color: #666; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 500px; }
        .history-actions { display: flex; gap: 8px; }
        .action-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 0.8rem; }
        .action-btn:hover { border-color: #6366f1; color: #a855f7; }
        .action-btn.delete:hover { border-color: #ef4444; color: #f87171; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .cta { text-align: center; margin-top: 40px; }
        .cta a { color: #a855f7; text-decoration: none; font-weight: 600; }
        @media (max-width: 640px) { .history-card { flex-direction: column; text-align: center; } .history-preview { max-width: 100%; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>ResumeForge AI</h1>
        <a href="/">Back to Optimizer</a>
    </div>

    <div class="container">
        <div class="hero">
            <h2>Optimization History</h2>
            <p>Your past resume optimizations</p>
        </div>

        <div class="history-list" id="historyList">
            <div class="empty-state">Loading...</div>
        </div>

        <div class="cta">
            <a href="/">&#x2190; Back to Resume Optimizer</a>
        </div>
    </div>

    <script>
        async function loadHistory() {
            try {
                const resp = await fetch('/api/history');
                const data = await resp.json();
                const list = document.getElementById('historyList');

                if (!data.records || data.records.length === 0) {
                    list.innerHTML = '<div class="empty-state"><p>No optimization history yet.</p><p style="margin-top:12px"><a href="/" style="color:#a855f7">Optimize your first resume</a></p></div>';
                    return;
                }

                list.innerHTML = data.records.map(r => {
                    const score = r.result?.ats_score || 0;
                    const scoreClass = score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low';
                    const date = new Date(r.created_at).toLocaleDateString();
                    const preview = (r.resume_text || '').substring(0, 80) + '...';
                    return '<div class="history-card" onclick="viewRecord(\'' + r.id + '\')">' +
                        '<div class="history-score ' + scoreClass + '">' + score + '</div>' +
                        '<div class="history-info">' +
                        '<span class="history-mode">' + r.mode + '</span>' +
                        '<div class="history-date">' + date + '</div>' +
                        '<div class="history-preview">' + preview + '</div>' +
                        '</div>' +
                        '<div class="history-actions">' +
                        '<button class="action-btn delete" onclick="event.stopPropagation(); deleteRecord(\'' + r.id + '\')">Delete</button>' +
                        '</div></div>';
                }).join('');
            } catch (err) {
                document.getElementById('historyList').innerHTML = '<div class="empty-state">Failed to load history</div>';
            }
        }

        function viewRecord(id) {
            window.location.href = '/api/history/' + id;
        }

        async function deleteRecord(id) {
            if (!confirm('Delete this record?')) return;
            await fetch('/api/history/' + id, { method: 'DELETE' });
            loadHistory();
        }

        loadHistory();
    </script>
</body>
</html>
