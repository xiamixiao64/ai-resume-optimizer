<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge AI - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: #111; border-bottom: 1px solid #222; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; color: #a855f7; }
        .header a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px 60px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: #a855f7; }
        .stat-label { font-size: 0.85rem; color: #888; margin-top: 4px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
        .chart-card h3 { font-size: 1rem; margin-bottom: 16px; color: #fff; }
        .event-list { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
        .event-list h3 { font-size: 1rem; margin-bottom: 16px; color: #fff; }
        .event-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .event-item:last-child { border-bottom: none; }
        .event-type { color: #a855f7; font-weight: 600; }
        .event-count { color: #888; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .chart-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Dashboard</h1>
        <a href="/">Back to App</a>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value" id="totalUsers">-</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-value" id="totalEvents">-</div><div class="stat-label">Total Events</div></div>
            <div class="stat-card"><div class="stat-value" id="optimizeCount">-</div><div class="stat-label">Optimizations</div></div>
            <div class="stat-card"><div class="stat-value" id="linkedinCount">-</div><div class="stat-label">LinkedIn Optimizes</div></div>
        </div>

        <div class="chart-row">
            <div class="chart-card">
                <h3>Daily Events (Last 7 Days)</h3>
                <canvas id="dailyChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Event Distribution</h3>
                <canvas id="eventChart"></canvas>
            </div>
        </div>

        <div class="event-list">
            <h3>Event Breakdown</h3>
            <div id="eventBreakdown"></div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const resp = await fetch('/api/admin/stats');
                const data = await resp.json();

                document.getElementById('totalUsers').textContent = data.total_users || 0;
                document.getElementById('totalEvents').textContent = data.total_events || 0;
                document.getElementById('optimizeCount').textContent = data.event_counts?.optimize_complete || 0;
                document.getElementById('linkedinCount').textContent = data.event_counts?.linkedin_optimize || 0;

                // Daily chart
                const dailyLabels = Object.keys(data.daily_events || {}).reverse();
                const dailyValues = Object.values(data.daily_events || {}).reverse();
                new Chart(document.getElementById('dailyChart'), {
                    type: 'bar',
                    data: {
                        labels: dailyLabels.map(d => d.slice(5)),
                        datasets: [{ label: 'Events', data: dailyValues, backgroundColor: '#6366f1', borderRadius: 4 }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#222' } }, x: { grid: { display: false } } } }
                });

                // Event distribution chart
                const eventLabels = Object.keys(data.event_counts || {});
                const eventValues = Object.values(data.event_counts || {});
                const colors = ['#6366f1', '#a855f7', '#ec4899', '#22c55e', '#eab308', '#ef4444', '#06b6d4', '#8b5cf6'];
                new Chart(document.getElementById('eventChart'), {
                    type: 'doughnut',
                    data: {
                        labels: eventLabels,
                        datasets: [{ data: eventValues, backgroundColor: colors.slice(0, eventLabels.length) }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'right', labels: { color: '#888' } } } }
                });

                // Event breakdown list
                const breakdown = document.getElementById('eventBreakdown');
                eventLabels.forEach((label, i) => {
                    // Escape HTML to prevent XSS
                    const escapedLabel = label.replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
                    const escapedCount = String(eventValues[i]).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
                    breakdown.innerHTML += '<div class="event-item"><span class="event-type">' + escapedLabel + '</span><span class="event-count">' + escapedCount + '</span></div>';
                });
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }
        loadStats();
    </script>
</body>
</html>
