<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge AI - LinkedIn Optimization</title>
    <meta name="description" content="Optimize your LinkedIn profile with AI. Improve your headline, About section, and experience for better visibility.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
        .header { background: #111; border-bottom: 1px solid #222; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.2rem; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header a { color: #a855f7; text-decoration: none; font-weight: 600; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }
        .hero { text-align: center; padding: 40px 0 30px; }
        .hero h2 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; color: #fff; }
        .hero p { color: #888; max-width: 500px; margin: 0 auto; }
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        textarea { width: 100%; min-height: 200px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; color: #e0e0e0; font-family: inherit; font-size: 0.95rem; resize: vertical; }
        textarea:focus { outline: none; border-color: #6366f1; }
        textarea::placeholder { color: #555; }
        input[type="text"] { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px 16px; color: #e0e0e0; font-family: inherit; font-size: 0.95rem; }
        input[type="text"]:focus { outline: none; border-color: #6366f1; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #ccc; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #0077b5, #00a0dc); border: none; border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s; margin-top: 16px; }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #0077b5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-section { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
        .result-section h3 { color: #0077b5; margin-bottom: 12px; font-size: 1rem; }
        .result-text { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin: 3px; }
        .tag.skill { background: #1a2e1a; color: #22c55e; }
        .tag.keyword { background: #1a1a30; color: #818cf8; }
        .btn-group { display: flex; gap: 12px; margin-top: 12px; }
        .copy-btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; font-size: 0.9rem; background: #0077b5; color: #fff; }
        .copy-btn:hover { background: #006ba1; }
        .cta { text-align: center; margin-top: 40px; }
        .cta a { color: #a855f7; text-decoration: none; font-weight: 600; }
        @media (max-width: 640px) { .hero h2 { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>ResumeForge AI</h1>
        <a href="/">Back to Optimizer</a>
    </div>

    <div class="container">
        <div class="hero">
            <h2>Optimize Your LinkedIn Profile</h2>
            <p>AI-powered suggestions to boost your profile visibility and recruiter engagement</p>
        </div>

        <div class="card">
            <form id="linkedinForm" onsubmit="optimizeProfile(event)">
                <label>Paste Your LinkedIn Profile *</label>
                <textarea id="profileText" placeholder="Copy and paste your LinkedIn profile content here...&#10;&#10;Include: Headline, About, Experience, Skills&#10;&#10;Tip: Go to your LinkedIn profile, click 'Show all' on each section, and copy the text." required></textarea>
                <br><br>
                <label>Target Role <span style="color:#666;font-weight:400">(optional)</span></label>
                <input type="text" id="targetRole" placeholder="e.g., Senior Product Manager, Full Stack Developer">
                <button type="submit" class="submit-btn" id="submitBtn">Optimize My LinkedIn Profile</button>
            </form>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI is analyzing your LinkedIn profile...</p>
            </div>
        </div>

        <div id="results"></div>

        <div class="cta">
            <a href="/">&#x2190; Back to Resume Optimizer</a>
        </div>
    </div>

    <script>
        async function optimizeProfile(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const form = document.getElementById('linkedinForm');
            const results = document.getElementById('results');

            btn.disabled = true;
            loading.style.display = 'block';
            form.style.display = 'none';
            results.innerHTML = '';

            const formData = new FormData();
            formData.append('profile_text', document.getElementById('profileText').value);
            formData.append('target_role', document.getElementById('targetRole').value);

            try {
                const resp = await fetch('/api/linkedin/optimize', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.error) {
                    results.innerHTML = '<div class="card"><p style="color:#f87171">' + data.error + '</p></div>';
                } else {
                    let html = '';

                    if (data.headline) {
                        html += '<div class="result-section"><h3>Optimized Headline</h3>';
                        html += '<div class="result-text" id="headlineText">' + data.headline + '</div>';
                        html += '<div class="btn-group"><button class="copy-btn" onclick="copyText(\'headlineText\')">Copy</button></div></div>';
                    }

                    if (data.about) {
                        html += '<div class="result-section"><h3>Optimized About</h3>';
                        html += '<div class="result-text" id="aboutText">' + data.about + '</div>';
                        html += '<div class="btn-group"><button class="copy-btn" onclick="copyText(\'aboutText\')">Copy</button></div></div>';
                    }

                    if (data.experience && data.experience.length > 0) {
                        html += '<div class="result-section"><h3>Optimized Experience</h3>';
                        data.experience.forEach(exp => {
                            html += '<div style="margin-bottom:16px"><strong style="color:#a855f7">' + exp.title + '</strong> at <strong>' + exp.company + '</strong></div>';
                            exp.optimized_bullets.forEach(b => {
                                html += '<div style="padding:6px 0;color:#ccc;font-size:0.9rem">• ' + b + '</div>';
                            });
                        });
                        html += '</div>';
                    }

                    if (data.skills_suggestion && data.skills_suggestion.length > 0) {
                        html += '<div class="result-section"><h3>Suggested Skills</h3>';
                        data.skills_suggestion.forEach(s => { html += '<span class="tag skill">' + s + '</span>'; });
                        html += '</div>';
                    }

                    if (data.keywords_to_add && data.keywords_to_add.length > 0) {
                        html += '<div class="result-section"><h3>Keywords to Add</h3>';
                        data.keywords_to_add.forEach(k => { html += '<span class="tag keyword">' + k + '</span>'; });
                        html += '</div>';
                    }

                    if (data.improvements && data.improvements.length > 0) {
                        html += '<div class="result-section"><h3>Improvement Tips</h3>';
                        data.improvements.forEach((imp, i) => {
                            html += '<div style="padding:8px 0;border-bottom:1px solid #222"><span style="color:#a855f7;font-weight:700">' + (i+1) + '.</span> ' + imp + '</div>';
                        });
                        html += '</div>';
                    }

                    results.innerHTML = html || '<div class="card"><p>Optimization completed. Review the suggestions above.</p></div>';
                }
            } catch (err) {
                results.innerHTML = '<div class="card"><p style="color:#f87171">Error: ' + err.message + '</p></div>';
            }

            btn.disabled = false;
            loading.style.display = 'none';
            form.style.display = 'block';
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                event.target.textContent = 'Copied!';
                setTimeout(() => event.target.textContent = 'Copy', 2000);
            });
        }
    </script>
</body>
</html>
