<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', 'Times New Roman', serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; background: #fff; }
        
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #ccc; margin-bottom: 25px; }
        h1 { font-size: 32px; color: #1a1a1a; margin-bottom: 10px; font-weight: 400; }
        .contact { color: #666; font-size: 14px; }
        .contact span { margin: 0 10px; }
        
        h2 { font-size: 14px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; margin: 25px 0 15px; font-weight: 600; }
        
        .job { margin-bottom: 20px; }
        .job-header { margin-bottom: 8px; }
        .job-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
        .job-meta { font-size: 13px; color: #666; margin-top: 4px; }
        ul { margin: 10px 0; padding-left: 20px; }
        li { margin-bottom: 6px; font-size: 14px; line-height: 1.6; }
        
        .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .skill-item { font-size: 13px; }
        
        @media print {
            body { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ name }}</h1>
        <div class="contact">
            <span>{{ email }}</span>
            <span>|</span>
            <span>{{ phone }}</span>
            <span>|</span>
            <span>{{ linkedin }}</span>
        </div>
    </div>
    
    {% if summary %}
    <p style="margin-bottom:20px;font-size:14px;line-height:1.7;">{{ summary }}</p>
    {% endif %}
    
    {{ content | safe }}
</body>
</html>
