<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Helvetica Neue', sans-serif; line-height: 1.5; color: #222; max-width: 800px; margin: 0 auto; padding: 40px; background: #fff; }
        
        h1 { font-size: 24px; color: #222; margin-bottom: 5px; }
        .contact { color: #666; font-size: 13px; margin-bottom: 20px; }
        .contact span { margin-right: 15px; }
        
        h2 { font-size: 14px; color: #222; font-weight: 600; margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
        
        .job { margin-bottom: 18px; }
        .job-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .job-title { font-weight: 600; font-size: 15px; }
        .job-dates { color: #888; font-size: 13px; }
        .job-company { color: #666; font-size: 14px; }
        ul { margin: 8px 0; padding-left: 18px; }
        li { margin-bottom: 5px; font-size: 13px; color: #444; }
        
        .skills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .skill { font-size: 12px; color: #555; background: #f5f5f5; padding: 4px 10px; border-radius: 3px; }
        
        @media print {
            body { padding: 25px; }
        }
    </style>
</head>
<body>
    <h1>{{ name }}</h1>
    <div class="contact">
        <span>{{ email }}</span>
        <span>{{ phone }}</span>
        <span>{{ linkedin }}</span>
    </div>
    
    {{ content | safe }}
</body>
</html>
