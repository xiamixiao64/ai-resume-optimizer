<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.5; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; }
        h1 { font-size: 24px; color: #2563eb; margin-bottom: 5px; }
        .contact { color: #666; font-size: 14px; margin-bottom: 20px; }
        h2 { font-size: 16px; color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 5px; margin: 20px 0 10px; }
        .job { margin-bottom: 15px; }
        .job-title { font-weight: bold; font-size: 16px; }
        .job-company { color: #666; }
        .job-dates { color: #888; font-size: 14px; }
        ul { margin: 10px 0; padding-left: 20px; }
        li { margin-bottom: 5px; font-size: 14px; }
        .skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill { background: #f3f4f6; padding: 4px 10px; border-radius: 4px; font-size: 13px; }
        @media print { body { padding: 20px; } }
    </style>
</head>
<body>
    <h1>{{ name }}</h1>
    <div class="contact">{{ contact }}</div>
    
    {{ content | safe }}
</body>
</html>
