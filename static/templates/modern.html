<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px; background: #fff; }
        
        /* Header */
        .header { border-bottom: 3px solid #2563eb; padding-bottom: 20px; margin-bottom: 25px; }
        h1 { font-size: 28px; color: #1e3a5f; margin-bottom: 8px; letter-spacing: 1px; }
        .contact { display: flex; flex-wrap: wrap; gap: 20px; color: #555; font-size: 14px; }
        .contact span { display: flex; align-items: center; gap: 5px; }
        
        /* Sections */
        h2 { font-size: 16px; color: #2563eb; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #2563eb; padding-bottom: 8px; margin: 25px 0 15px; }
        
        /* Experience */
        .job { margin-bottom: 20px; page-break-inside: avoid; }
        .job-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
        .job-title { font-size: 16px; font-weight: 700; color: #1e3a5f; }
        .job-company { font-size: 14px; color: #666; }
        .job-dates { font-size: 13px; color: #888; }
        ul { margin: 8px 0; padding-left: 20px; }
        li { margin-bottom: 6px; font-size: 14px; line-height: 1.5; color: #444; }
        
        /* Education */
        .education { margin-bottom: 15px; }
        .degree { font-weight: 600; }
        .school { color: #666; }
        
        /* Skills */
        .skills-section { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill { background: #f0f4ff; color: #2563eb; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        
        /* Summary */
        .summary { font-size: 14px; line-height: 1.7; color: #444; margin-bottom: 20px; }
        
        @media print {
            body { padding: 30px; }
            .job { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ name }}</h1>
        <div class="contact">
            {% if email %}<span>📧 {{ email }}</span>{% endif %}
            {% if phone %}<span>📱 {{ phone }}</span>{% endif %}
            {% if linkedin %}<span>🔗 {{ linkedin }}</span>{% endif %}
            {% if location %}<span>📍 {{ location }}</span>{% endif %}
        </div>
    </div>
    
    {% if summary %}
    <div class="summary">{{ summary }}</div>
    {% endif %}
    
    {{ content | safe }}
</body>
</html>
